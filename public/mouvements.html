<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mouvements — Stock Agdal-Ryad</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="js/app.js"></script>
</head>
<body>
<script>
const user = initPage('mouvements', 'Mouvements', 'الحركات');

// Problème 3 — Redirection agent
if (user && user.role === 'agent') {
  window.location.href = 'dashboard.html';
}

if (user && user.role !== 'agent') initMouvements();

let mouvHistory = [], histDateFrom = '', histDateTo = '', histType = '';

async function initMouvements() {
  const content = document.getElementById('page-content');
  content.innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title-fr"><i class="fa-solid fa-right-left"></i> Historique des Mouvements</div>
        <div class="page-title-ar">سجل حركات المخزون</div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <i class="fa-solid fa-filter"></i> Filtres / الفلاتر
      </div>
      <div class="card-body">
        <div class="filters-bar">
          <select class="form-control" id="h-type" style="width:160px" onchange="filterHistory()">
            <option value="">Tous types / كل الأنواع</option>
            <option value="sortie">Sortie / خروج</option>
            <option value="entree">Entrée / دخول</option>
          </select>
          <div style="display:flex;align-items:center;gap:6px">
            <label style="font-size:11px;color:#888;white-space:nowrap">Du / من</label>
            <input type="date" class="form-control" id="h-from" style="width:150px" onchange="filterHistory()">
          </div>
          <div style="display:flex;align-items:center;gap:6px">
            <label style="font-size:11px;color:#888;white-space:nowrap">Au / إلى</label>
            <input type="date" class="form-control" id="h-to" style="width:150px" onchange="filterHistory()">
          </div>
          <button class="btn btn-outline" onclick="resetFilters()">
            <i class="fa-solid fa-rotate-left"></i> Réinitialiser
          </button>
          <span id="mouv-count" style="margin-left:auto;font-size:11px;color:#888"></span>
        </div>
      </div>
    </div>

    <div class="card" style="margin-top:16px">
      <div class="card-body" style="padding:0">
        <div class="table-container">
          <table>
            <thead><tr>
              <th>Date / التاريخ</th>
              <th>Type / النوع</th>
              <th>Article / المادة</th>
              <th>Quantité / الكمية</th>
              <th>Demandeur / الطالب</th>
              <th>Motif / السبب</th>
              <th>Validé par / اعتمد</th>
              <th style="text-align:center">Bon PDF</th>
            </tr></thead>
            <tbody id="hist-tbody"></tbody>
          </table>
        </div>
        <div style="padding:10px 16px;border-top:1px solid #eee;font-size:11px;color:#888" id="hist-foot"></div>
      </div>
    </div>`;

  await loadHistory();
  setInterval(loadHistory, 30000);
}

async function loadHistory() {
  let url = '/api/mouvements?';
  if (histType) url += `type=${histType}&`;
  if (histDateFrom) url += `date_from=${histDateFrom}&`;
  if (histDateTo) url += `date_to=${histDateTo}&`;

  mouvHistory = await apiGet(url);
  renderHistory();
}

function filterHistory() {
  histType = document.getElementById('h-type').value;
  histDateFrom = document.getElementById('h-from').value;
  histDateTo = document.getElementById('h-to').value;
  loadHistory();
}

function resetFilters() {
  histType = ''; histDateFrom = ''; histDateTo = '';
  document.getElementById('h-type').value = '';
  document.getElementById('h-from').value = '';
  document.getElementById('h-to').value = '';
  loadHistory();
}

function renderHistory() {
  const tbody = document.getElementById('hist-tbody');
  const foot = document.getElementById('hist-foot');
  const count = document.getElementById('mouv-count');
  if (count) count.textContent = `${mouvHistory.length} mouvement(s) / حركة`;

  if (!mouvHistory.length) {
    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:#888;padding:28px">Aucun mouvement enregistré / لا توجد حركات مسجلة</td></tr>';
    if (foot) foot.textContent = '';
    return;
  }

  if (foot) foot.textContent = `${mouvHistory.length} résultat(s) affiché(s)`;

  tbody.innerHTML = mouvHistory.map(m => `
    <tr>
      <td style="font-size:10px;white-space:nowrap">${fmtDate(m.date)}</td>
      <td>${m.type === 'sortie'
        ? '<span class="badge badge-sortie"><i class="fa-solid fa-arrow-up-right-from-square"></i> Sortie</span>'
        : '<span class="badge badge-entree"><i class="fa-solid fa-arrow-down-left"></i> Entrée</span>'}</td>
      <td>
        <div style="font-size:12px;font-weight:600">${m.article_designation}</div>
        <div style="font-size:9px;color:var(--green-morocco);font-weight:700">${m.article_id}</div>
        <div style="font-size:9px;color:#aaa;direction:rtl">${m.article_designation_ar || ''}</div>
      </td>
      <td style="font-weight:700;color:${m.type === 'sortie' ? 'var(--red-morocco)' : 'var(--success-green)'}">
        ${m.type === 'sortie' ? '−' : '+'}${m.quantite} <span style="font-size:10px;color:#888;font-weight:400">${m.article_unite}</span>
      </td>
      <td style="font-size:11px">${m.demandeur || m.fournisseur || '—'}</td>
      <td style="font-size:11px;max-width:160px;white-space:normal;line-height:1.3">${m.motif || '—'}</td>
      <td style="font-size:11px">${m.valide_par || '—'}</td>
      <td style="text-align:center">
        <button class="btn btn-sm btn-gold" onclick="telechargerBonPDF(${m.id})" title="Télécharger le bon PDF">
          <i class="fa-solid fa-file-pdf"></i> Bon
        </button>
      </td>
    </tr>`).join('');
}

function telechargerBonPDF(mouvId) {
  const m = mouvHistory.find(x => x.id === mouvId);
  if (!m) return;

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ format: 'a5', orientation: 'portrait' });
  const W = doc.internal.pageSize.width;
  const isSortie = m.type === 'sortie';
  const title = isSortie ? 'BON DE SORTIE' : "BON D'ENTREE";

  // ─── En-tête officielle (100% francais - jsPDF ne supporte pas l'arabe) ──
  doc.setFillColor(0, 66, 37);
  doc.rect(0, 0, W, 40, 'F');
  doc.setTextColor(201, 168, 76);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(7);

  const lignes = [
    'ROYAUME DU MAROC',
    "MINISTERE DE L'INTERIEUR",
    'WILAYA RABAT-SALE-KENITRA',
    'COMMUNE DE RABAT — ARROND. AGDAL-RYAD',
    'SERVICE VOIRIE & ECLAIRAGE PUBLIC'
  ];
  lignes.forEach((l, i) => doc.text(l, W / 2, 6 + i * 6.5, { align: 'center' }));

  // ─── Bande dorée + titre ─────────────────────────────────────────────────
  doc.setFillColor(201, 168, 76);
  doc.rect(0, 41, W, 11, 'F');
  doc.setTextColor(0, 42, 20);
  doc.setFontSize(12);
  doc.setFont('helvetica', 'bold');
  doc.text(`${title}  N° ${m.id}`, W / 2, 49, { align: 'center' });

  // ─── Date ────────────────────────────────────────────────────────────────
  doc.setTextColor(60, 60, 60);
  doc.setFontSize(8);
  doc.setFont('helvetica', 'normal');
  doc.text(`Date : ${fmtDate(m.date)}`, W / 2, 58, { align: 'center' });

  doc.setDrawColor(201, 168, 76);
  doc.setLineWidth(0.4);
  doc.line(4, 61, W - 4, 61);

  // ─── Corps du bon (libelles 100% francais) ────────────────────────────────
  const rows = [
    ['Article', `${m.article_id} — ${m.article_designation}`],
    ['Quantite', `${m.quantite} ${m.article_unite}`],
    ['Stock avant', `${m.quantite_avant} ${m.article_unite}`],
    ['Stock apres', `${m.quantite_apres} ${m.article_unite}`],
  ];

  if (isSortie) {
    rows.push(['Demandeur', m.demandeur || '—']);
    rows.push(['Motif', m.motif || '—']);
  } else {
    rows.push(['Fournisseur', m.fournisseur || '—']);
    rows.push(['Reference', m.motif || '—']);
  }
  rows.push(['Valide par', m.valide_par || '—']);

  doc.autoTable({
    startY: 64,
    head: [],
    body: rows,
    styles: { fontSize: 9, cellPadding: 4, font: 'helvetica' },
    columnStyles: {
      0: { fontStyle: 'bold', fillColor: [240, 247, 243], cellWidth: 48, textColor: [0, 66, 37] },
      1: { cellWidth: W - 58 }
    },
    margin: { left: 4, right: 4 }
  });

  // ─── Zone de signature ───────────────────────────────────────────────────
  const finalY = doc.lastAutoTable.finalY + 14;
  doc.setFontSize(8);
  doc.setFont('helvetica', 'bold');
  doc.setTextColor(30, 30, 30);
  doc.text('Signature du Responsable :', 4, finalY);
  doc.setDrawColor(150, 150, 150);
  doc.setLineWidth(0.3);
  doc.line(4, finalY + 18, W - 4, finalY + 18);

  // ─── Pied de page ────────────────────────────────────────────────────────
  doc.setFontSize(7);
  doc.setTextColor(160, 160, 160);
  doc.text('Arrondissement Agdal-Ryad — مقاطعة أكدال الرياض — 2025', W / 2, doc.internal.pageSize.height - 6, { align: 'center' });

  doc.save(`${title.replace(/ /g, '_')}_N${m.id}.pdf`);
}
</script>
</body>
</html>
