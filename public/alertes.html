<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alertes — Stock Agdal-Ryad</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="js/app.js"></script>
</head>
<body>
<script>
const user = initPage('alertes', 'Alertes', 'التنبيهات');
if (user) initAlertes();

async function initAlertes() {
  const content = document.getElementById('page-content');
  content.innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title-fr"><i class="fa-solid fa-bell"></i> Alertes de Stock</div>
        <div class="page-title-ar">تنبيهات المخزون</div>
      </div>
      <div style="display:flex;gap:10px;align-items:center">
        <span id="last-refresh" style="font-size:10px;color:#888"></span>
        <button class="btn btn-gold" onclick="exportAlertPDF()">
          <i class="fa-solid fa-print"></i> Imprimer / طباعة
        </button>
      </div>
    </div>
    <div id="alertes-content"></div>`;
  
  await refreshAlertes();
  setInterval(refreshAlertes, 60000);
}

let alertData = null;

async function refreshAlertes() {
  try {
    alertData = await apiGet('/api/alertes');
    document.getElementById('last-refresh').textContent = 'Actualisé: ' + new Date().toLocaleTimeString('fr-MA');
    renderAlertes();
  } catch(e) { console.error(e); }
}

function renderAlertes() {
  const { ruptures, stock_faible } = alertData;
  const content = document.getElementById('alertes-content');
  
  content.innerHTML = `
    <!-- RUPTURES -->
    <div class="card" style="border-top-color:var(--red-morocco);margin-bottom:16px">
      <div class="card-header" style="background:var(--red-morocco)">
        <i class="fa-solid fa-circle-xmark"></i>
        Ruptures de Stock (${ruptures.length}) — نفاد المخزون
      </div>
      <div class="card-body">
        ${!ruptures.length ? `<p style="text-align:center;color:var(--success-green);padding:16px"><i class="fa-solid fa-circle-check"></i> Aucune rupture de stock — لا يوجد نفاد مخزون</p>` :
          ruptures.map(a => renderAlertCard(a, 'rupture')).join('')}
      </div>
    </div>

    <!-- STOCK FAIBLE -->
    <div class="card" style="border-top-color:var(--alert-orange)">
      <div class="card-header" style="background:var(--alert-orange)">
        <i class="fa-solid fa-triangle-exclamation"></i>
        Stock Faible (${stock_faible.length}) — مخزون منخفض
      </div>
      <div class="card-body">
        ${!stock_faible.length ? `<p style="text-align:center;color:var(--success-green);padding:16px"><i class="fa-solid fa-circle-check"></i> Aucun stock faible — لا يوجد مخزون منخفض</p>` :
          stock_faible.map(a => renderAlertCard(a, 'faible')).join('')}
      </div>
    </div>`;
}

function renderAlertCard(a, type) {
  const isRupture = type === 'rupture';
  const pct = isRupture ? 0 : Math.round((a.quantite / a.seuil) * 100);
  return `
    <div class="alert-card ${type}" style="margin-bottom:10px">
      <div class="alert-icon">
        <i class="fa-solid ${isRupture ? 'fa-circle-xmark' : 'fa-triangle-exclamation'}"></i>
      </div>
      <div style="flex:1">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
          <span style="font-size:10px;font-weight:800;color:${isRupture ? 'var(--red-morocco)' : 'var(--alert-orange)'}">${a.id}</span>
          <span style="font-size:13px;font-weight:700">${a.designation}</span>
        </div>
        <div style="font-size:11px;color:#888;direction:rtl;text-align:right;margin-bottom:4px">${a.designation_ar || ''}</div>
        <div style="display:flex;gap:20px;font-size:11px">
          <span>Quantité: <strong style="color:${isRupture?'var(--red-morocco)':'var(--alert-orange)'}">${a.quantite} ${a.unite}</strong></span>
          <span>Seuil: <strong>${a.seuil} ${a.unite}</strong></span>
          <span>Section: <strong>${a.section}</strong></span>
        </div>
        ${!isRupture ? `
        <div style="margin-top:6px;background:#eee;border-radius:4px;height:6px;overflow:hidden">
          <div style="background:var(--alert-orange);width:${Math.min(pct,100)}%;height:100%;border-radius:4px"></div>
        </div>
        <div style="font-size:9px;color:#aaa;margin-top:2px">${pct}% du seuil</div>` : ''}
      </div>
    </div>`;
}

async function exportAlertPDF() {
  if (!alertData) return;
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const W = doc.internal.pageSize.width;
  
  doc.setFillColor(0,66,37);
  doc.rect(0,0,W,34,'F');
  doc.setTextColor(201,168,76);
  doc.setFont('helvetica','bold');
  doc.setFontSize(7.5);
  ['ROYAUME DU MAROC','MINISTERE DE L\'INTERIEUR','WILAYA RABAT-SALE-KENITRA','COMMUNE DE RABAT — ARROND. AGDAL-RYAD','SERVICE VOIRIE & ECLAIRAGE PUBLIC'].forEach((l,i)=>doc.text(l,10,7+i*5));
  doc.setFontSize(11);
  doc.text('RAPPORT D\'ALERTES — تقرير التنبيهات', W/2, 38, {align:'center'});
  doc.setFontSize(8);
  doc.setTextColor(100,100,100);
  doc.text(`Arrêté le ${new Date().toLocaleDateString('fr-MA')} — Établi par ${user.nom}`, W/2, 44, {align:'center'});
  
  doc.setFillColor(193,39,45);
  doc.rect(10,48,W-20,7,'F');
  doc.setTextColor(255,255,255);
  doc.setFontSize(9);
  doc.text(`RUPTURES DE STOCK (${alertData.ruptures.length})`, W/2, 53.5, {align:'center'});
  
  if (alertData.ruptures.length) {
    doc.autoTable({
      head:[['Code','Désignation','Qté','Unité','Seuil','Section']],
      body: alertData.ruptures.map(a=>[a.id,a.designation,0,a.unite,a.seuil,a.section]),
      startY:57,
      styles:{fontSize:8,cellPadding:2},
      headStyles:{fillColor:[193,39,45],textColor:[255,255,255]},
      margin:{left:10,right:10}
    });
  }
  
  const y2 = doc.lastAutoTable ? doc.lastAutoTable.finalY + 8 : 65;
  doc.setFillColor(224,123,0);
  doc.rect(10,y2,W-20,7,'F');
  doc.setTextColor(255,255,255);
  doc.setFontSize(9);
  doc.text(`STOCK FAIBLE (${alertData.stock_faible.length})`, W/2, y2+5.5, {align:'center'});
  
  if (alertData.stock_faible.length) {
    doc.autoTable({
      head:[['Code','Désignation','Qté','Unité','Seuil','Section']],
      body: alertData.stock_faible.map(a=>[a.id,a.designation,a.quantite,a.unite,a.seuil,a.section]),
      startY:y2+9,
      styles:{fontSize:8,cellPadding:2},
      headStyles:{fillColor:[224,123,0],textColor:[255,255,255]},
      alternateRowStyles:{fillColor:[255,248,240]},
      margin:{left:10,right:10}
    });
  }
  
  doc.save(`Alertes_Stock_${new Date().toISOString().slice(0,10)}.pdf`);
}
</script>
</body>
</html>
